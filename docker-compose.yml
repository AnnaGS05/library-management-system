version: "3.9"

services:
  db:
    image: postgres:15
    container_name: library-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: library-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: library-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

  adminer:
    image: adminer
    container_name: library-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
